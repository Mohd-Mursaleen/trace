kind = "mobile"
previewPath = "/"
title = "log.af"
version = "1.0.0"
id = "artifacts/logaf"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19526

[services.development]
run = "pnpm --filter @workspace/logaf run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logaf", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/logaf", "run", "serve" ]

[services.env]
PORT = "19526"
BASE_PATH = "/"
