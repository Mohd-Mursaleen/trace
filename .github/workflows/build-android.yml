name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout ----
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Java (Gradle 8.x requires Java 17+) ----
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ---- Android SDK ----
      # ubuntu-latest has the SDK pre-installed at $ANDROID_HOME.
      # We install the exact API level + build tools the project needs.
      - name: Install Android SDK packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" \
            --licenses || true

      # ---- Node + pnpm ----
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ---- Caches ----
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      # ---- Install dependencies ----
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Expo Prebuild ----
      # Regenerates the android/ native project to match current deps.
      # --no-install: skip npm/pnpm install (already done above).
      - name: Expo Prebuild
        working-directory: artifacts/logaf
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_DEEPGRAM_API_KEY: ${{ secrets.EXPO_PUBLIC_DEEPGRAM_API_KEY }}

      # ---- Make gradlew executable ----
      - name: Make gradlew executable
        run: chmod +x artifacts/logaf/android/gradlew

      # ---- Build debug APK ----
      - name: Build Debug APK
        working-directory: artifacts/logaf/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          EXPO_PUBLIC_DEEPGRAM_API_KEY: ${{ secrets.EXPO_PUBLIC_DEEPGRAM_API_KEY }}
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      # ---- Upload artifact ----
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trace-debug-${{ github.sha }}
          path: artifacts/logaf/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
